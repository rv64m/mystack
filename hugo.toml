[params]
  author = "Alex Chen"
  description = "Designer and developer. Quiet, intentional software."
  greeting = "Hello, I'm"
  statement = "I design and build quiet, intentional software."

[menu]
  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 10
  [[menu.main]]
    name = 'Projects'
    url = '/projects/'
    weight = 20
  [[menu.main]]
    name = 'Memos'
    url = '/memos/'
    weight = 30
  [[menu.main]]
