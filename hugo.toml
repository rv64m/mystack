[taxonomies]
  tag = 'tags'
  series = 'series'
  category = 'categories'

[permalinks]
  blog = '/blog/:year/:month/:slug/'
  memos = '/memos/:year/:month/:contentbasename/'

[build]
  future = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.highlight]
    style = 'github'
    lineNos = false
    codeFences = true
    tabWidth = 2
