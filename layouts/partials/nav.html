<nav class="site-nav" id="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-wordmark">{{ .Site.Title }}</a>
    <div class="nav-actions">
      <button
        class="theme-toggle"
        id="theme-toggle"
        type="button"
        aria-label="Switch to dark mode"
        aria-pressed="false"
      >
        <span class="theme-toggle-sun" aria-hidden="true">Light</span>
        <span class="theme-toggle-moon" aria-hidden="true">Dark</span>
      </button>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
    </div>
    <ul class="nav-links" id="nav-links">
      {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}is-active{{ end }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </div>
</nav>
