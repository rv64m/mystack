<div class="hero-computer-wrapper" id="hero-computer-container">
  <div class="hero-computer" id="hero-computer">
    <svg class="computer-object" viewBox="0 0 420 400" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Body gradients -->
        <linearGradient id="bodyFront" x1="60" y1="30" x2="60" y2="340" gradientUnits="userSpaceOnUse">
          <stop stop-color="#F2EDE5"/>
          <stop offset="0.6" stop-color="#E8E2D8"/>
          <stop offset="1" stop-color="#DDD6CA"/>
        </linearGradient>
        <linearGradient id="bodySide" x1="320" y1="30" x2="360" y2="340" gradientUnits="userSpaceOnUse">
          <stop stop-color="#D5CEC2"/>
          <stop offset="1" stop-color="#C4BCAF"/>
        </linearGradient>
        <linearGradient id="bodyTop" x1="60" y1="30" x2="340" y2="15" gradientUnits="userSpaceOnUse">
          <stop stop-color="#FAF7F2"/>
          <stop offset="1" stop-color="#E8E2D8"/>
        </linearGradient>

        <!-- Screen gradients -->
        <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#2A2D35"/>
          <stop offset="100%" stop-color="#1A1C22"/>
        </radialGradient>
        <linearGradient id="bezelGrad" x1="90" y1="55" x2="90" y2="245" gradientUnits="userSpaceOnUse">
          <stop stop-color="#D5CEC4"/>
          <stop offset="1" stop-color="#C8C0B4"/>
        </linearGradient>

        <!-- Scanlines -->
        <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
          <rect width="4" height="2" fill="#000" opacity="0.08"/>
        </pattern>
        <!-- CRT curvature vignette -->
        <radialGradient id="crtVignette" cx="50%" cy="50%" r="65%">
          <stop offset="60%" stop-color="transparent"/>
          <stop offset="100%" stop-color="#000" opacity="0.4"/>
        </radialGradient>

        <!-- Sticker gradients -->
        <linearGradient id="rainbowPear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E85D4E"/>
          <stop offset="20%" stop-color="#E8A34E"/>
          <stop offset="40%" stop-color="#E8D44E"/>
          <stop offset="60%" stop-color="#5EB85E"/>
          <stop offset="80%" stop-color="#4E8DE8"/>
          <stop offset="100%" stop-color="#9B5EE8"/>
        </linearGradient>

        <clipPath id="screenClip">
          <path d="M100 70 C100 60, 110 55, 130 55 L290 55 C310 55, 320 60, 320 70 L320 240 C320 250, 310 255, 290 255 L130 255 C110 255, 100 250, 100 240 Z"/>
        </clipPath>
      </defs>

      <!-- ===== COMPUTER BODY ===== -->
      <path d="M320 30 L355 18 L355 350 L320 365 Z" fill="url(#bodySide)"/>
      <path d="M60 30 L95 18 L335 5 L320 18 Z" fill="url(#bodyTop)"/>
      <path d="M60 30 C60 15, 75 10, 100 10 L300 10 C325 10, 340 15, 340 30 L340 350 C340 362, 330 365, 320 365 L80 365 C70 365, 60 362, 60 350 Z" fill="url(#bodyFront)"/>

      <!-- ===== SCREEN BEZEL ===== -->
      <path d="M85 50 C85 38, 95 34, 115 34 L305 34 C325 34, 335 38, 335 50 L335 260 C335 272, 325 276, 305 276 L115 276 C95 276, 85 272, 85 260 Z" fill="url(#bezelGrad)"/>
      <path d="M92 56 C92 46, 100 42, 118 42 L302 42 C320 42, 328 46, 328 56 L328 250 C328 260, 320 264, 302 264 L118 264 C100 264, 92 260, 92 250 Z" fill="#3A3834"/>

      <!-- ===== SCREEN ===== -->
      <g clip-path="url(#screenClip)">
        <rect x="95" y="48" width="230" height="212" fill="url(#screenGlow)"/>
        <rect x="95" y="48" width="230" height="212" fill="url(#scanlines)"/>
        <rect x="95" y="48" width="230" height="212" fill="url(#crtVignette)"/>

        <rect x="95" y="48" width="230" height="20" fill="#1E2026"/>
        <text x="105" y="62" fill="#8A8F99" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="400">FigOS 1.0</text>
        <rect x="95" y="68" width="70" height="192" fill="#1E2026"/>
        <line x1="165" y1="68" x2="165" y2="260" stroke="#2A2D35" stroke-width="0.5"/>

        <g font-family="'JetBrains Mono', monospace" font-size="7" fill="#A0A5AD">
          <circle cx="108" cy="84" r="3" fill="#5B9BD5"/>
          <text x="116" y="87">System</text>
          <circle cx="108" cy="100" r="3" fill="#D4905B"/>
          <text x="116" y="103">Disk A</text>
          <circle cx="108" cy="116" r="3" fill="#6B6F78"/>
          <text x="116" y="119">Trash</text>
        </g>

        <g transform="translate(172, 86)">
          <rect x="0" y="0" width="130" height="68" rx="3" fill="#E8E2D8"/>
          <rect x="0" y="0" width="130" height="15" rx="3" fill="#D5CEC4"/>
          <text x="8" y="10" fill="#3A3834" font-family="'JetBrains Mono', monospace" font-size="7" font-weight="500">Untitled.txt</text>
          <text x="8" y="26" fill="#3A3834" font-family="'JetBrains Mono', monospace" font-size="7">Design is how</text>
          <text x="8" y="36" fill="#3A3834" font-family="'JetBrains Mono', monospace" font-size="7">it works.</text>
          <rect x="58" y="40" width="4" height="7" fill="#3A3834" opacity="0.7">
            <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite" calcMode="discrete"/>
          </rect>
        </g>
      </g>

      <!-- ===== FRONT PANEL DETAILS ===== -->
      <rect x="150" y="295" width="100" height="9" rx="4.5" fill="#2A2825"/>
      <rect x="152" y="296" width="96" height="7" rx="3.5" fill="#1A1816"/>

      <!-- ===== STICKERS ===== -->
      <g transform="translate(112, 355)">
        <path d="M0 -6 C-7 -6, -11 0, -11 5 C-11 11, -6 14, 0 14 C6 14, 11 11, 11 5 C11 0, 7 -6, 0 -6 Z" fill="url(#rainbowPear)"/>
      </g>
      <g transform="translate(190, 332)">
        <rect x="-36" y="-12" width="72" height="24" rx="2" fill="#9B2D2D"/>
        <text x="0" y="4" fill="#F0D5A8" font-family="'JetBrains Mono', monospace" font-size="6" font-weight="500" text-anchor="middle" letter-spacing="0.08em">MACHINE</text>
      </g>
    </svg>
  </div>
  <div class="scene-floor-shadow"></div>
</div>

<script>
  (function() {
    const container = document.getElementById('hero-computer-container');
    const computer = document.getElementById('hero-computer');

    if (!container || !computer) return;

    let targetRotateX = 0;
    let targetRotateY = 0;
    let currentRotateX = 0;
    let currentRotateY = 0;

    container.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      targetRotateY = ((x - centerX) / centerX) * 10;
      targetRotateX = ((centerY - y) / centerY) * 10;
    });

    container.addEventListener('mouseleave', () => {
      targetRotateX = 0;
      targetRotateY = 0;
    });

    function update() {
      currentRotateX += (targetRotateX - currentRotateX) * 0.1;
      currentRotateY += (targetRotateY - currentRotateY) * 0.1;

      computer.style.transform = `perspective(1000px) rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;
      requestAnimationFrame(update);
    }

    update();
  })();
</script>
