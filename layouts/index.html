{{ define "main" }}

<section class="hero">
  <div class="container">
    <div class="hero-inner">
      <div class="hero-text">
        <span class="hero-greeting">{{ .Site.Params.greeting | default "Hello, I'm" }}</span>
        <h1 class="hero-name">{{ .Site.Title }}</h1>
        <div class="hero-divider" aria-hidden="true"></div>
        <p class="hero-statement">{{ .Site.Params.statement | default "I design and build quiet, intentional software." }}</p>
        <nav class="hero-links">
          {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
          {{ end }}
        </nav>
      </div>

      <div class="hero-scene">
        {{ partial "hero-computer.html" . }}
      </div>
    </div>
  </div>
</section>

{{ end }}
