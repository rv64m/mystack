{"2026-04-17":[{"content":"\u003cp\u003eRe-reading \u003cem\u003eThe Elements of Typographic Style\u003c/em\u003e by Robert Bringhurst. Still the best book on typography after all these years.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u0026ldquo;Typography exists to honor content.\u0026rdquo;\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eEvery time I return to this book, I find something new. Today\u0026rsquo;s insight: the importance of optical alignment over mathematical alignment. Sometimes things need to feel right more than they need to measure right.\u003c/p\u003e\n","preview":"Re-reading The Elements of Typographic Style by Robert Bringhurst. Still the best book on typography after all these years.\n\u0026ldquo;Typography exists …","tags":["design"],"time":"10:00 AM","title":""}],"2026-04-18":[{"content":"\u003cp\u003eSpent the afternoon refining the memo card stack interaction. The key insight: the fan effect needs to feel physical but not chaotic.\u003c/p\u003e\n\u003cp\u003eCurrent approach uses subtle rotation (±0.5deg) and vertical offsets. On mobile, rotation is too noisy, so it switches to pure vertical stacking with scale reduction.\u003c/p\u003e\n","preview":"Spent the afternoon refining the memo card stack interaction. The key insight: the fan effect needs to feel physical but not chaotic.\nCurrent approach …","tags":["code"],"time":"11:15 AM","title":""},{"content":"\u003cp\u003eThe best designs are often the ones that subtract rather than add. I\u0026rsquo;ve been thinking about this a lot while working on the new portfolio site — every element needs to justify its existence.\u003c/p\u003e\n\u003cp\u003eThere\u0026rsquo;s a temptation to add features because you can, not because you should. Resisting that temptation is a skill.\u003c/p\u003e\n","preview":"The best designs are often the ones that subtract rather than add. I\u0026rsquo;ve been thinking about this a lot while working on the new portfolio site — …","tags":["thought"]
